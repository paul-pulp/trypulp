{% extends "base.html" %}
{% block title %}Check Your Email — PulpIQ{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 text-center load-in">
    <div class="w-16 h-16 bg-warm-200 rounded-full flex items-center justify-center mx-auto mb-5">
        <svg class="w-7 h-7 text-warm-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
    </div>
    <h1 class="text-2xl text-warm-800 mb-3">Check your inbox</h1>
    <p class="text-warm-600 mb-2">
        We sent a sign-in link to <strong class="text-warm-800">{{ email }}</strong>
    </p>
    <p class="text-sm text-warm-400">
        Click the link in the email to sign in. It expires in 15 minutes.
    </p>
    <a href="/login" class="inline-block mt-8 text-sm text-terra-600 hover:text-terra-700 font-medium">
        Didn't get it? Try again
    </a>
</div>
{% endblock %}
