{% extends "base.html" %}
{% block title %}Check Your Email — PulpIQ{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 text-center">
    <div class="text-5xl mb-4">&#9993;</div>
    <h1 class="text-2xl text-warm-800 mb-3">Check your inbox</h1>
    <p class="text-warm-600 mb-2">
        We sent a sign-in link to <strong>{{ email }}</strong>
    </p>
    <p class="text-sm text-warm-500">
        Click the link in the email to sign in. It expires in 15 minutes.
    </p>
    <a href="/login" class="inline-block mt-8 text-sm text-terra-600 hover:text-terra-700">
        Didn't get it? Try again
    </a>
</div>
{% endblock %}
